<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auton Paths | FRC Telemetry</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- Left HUD Panel -->
    <aside class="control-panel">
      <header>
        <div class="system-status">SYS.ONLINE // TEAM_<span id="team-display">3928</span></div>
        <h1>Auton Paths</h1>
      </header>

      <div class="hud-section">
        <h2>Telemetry</h2>
        <div class="readout-grid">
          <div class="readout-box">
            <span class="readout-label">CURSOR [X, Y]</span>
            <span class="readout-value" id="mouse-coords">0, 0</span>
          </div>
          <div class="readout-box">
            <span class="readout-label">START POS</span>
            <span class="readout-value" id="start-coords">---</span>
          </div>
        </div>
        <div class="readout-box full-width" style="margin-top: 12px; min-height: 80px; display: flex; flex-direction: column;">
          <span class="readout-label">PATH SEQUENCE</span>
          <span class="readout-value" id="path-sequence" style="font-size: 13px; line-height: 1.5; word-break: break-word; flex-grow: 1; padding-top: 5px;">NO DATA</span>
        </div>
      </div>

      <div class="hud-section">
        <h2>Team Metadata</h2>
        <div class="readout-box full-width">
          <span class="readout-label">TEAM IDENTIFIER</span>
          <input type="number" id="input-team" value="3928" class="cyber-input">
        </div>
      </div>

      <div class="hud-section">
        <h2>Settings</h2>
        <label class="checkbox-container">
          <input type="checkbox" id="check-debug">
          <span class="checkbox-label">SHOW REGION DEBUG</span>
        </label>
      </div>

      <div class="hud-section" style="margin-top: auto;">
        <h2>System Actions</h2>
        <div class="btn-group">
          <button id="btn-export">
            <span>Export Waypoints</span>
            <span class="hotkey">E</span>
          </button>
          <button id="btn-qr">
            <span>Generate QR Code</span>
            <span class="hotkey">Q</span>
          </button>
          <button id="btn-clear" class="btn-danger">
            <span>Clear Field Data</span>
            <span class="icon">⚠</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- QR Modal Overlay -->
    <div id="qr-overlay" class="overlay hidden">
      <div class="modal qr-modal">
        <header>
          <div class="system-status">DATA.TRANSMIT // QR-LINK</div>
          <h2>Path Waypoints</h2>
          <button id="btn-close-qr" class="close-btn">×</button>
        </header>
        <div class="qr-content">
          <canvas id="qr-canvas"></canvas>
          <div class="qr-meta">
            <span id="qr-point-count">0 POINTS</span>
            <span id="qr-encoding">UTF-8 / COMPRESSED</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Canvas Area -->
    <main class="canvas-wrapper">
      <div class="canvas-frame-tl"></div>
      <div class="canvas-frame-tr"></div>
      <div class="canvas-frame-bl"></div>
      <div class="canvas-frame-br"></div>
      <canvas id="canvas"></canvas>
    </main>

  </div>
  <script src="script.js"></script>
</body>
</html>
